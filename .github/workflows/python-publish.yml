name: Upload Python Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/datasetsforecast/
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing (OIDC)
    env:
      UV_PYTHON: "3.11"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
